name: ci

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  linux:
    name: linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: cachix/install-nix-action@v31.10.6
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake check
      - run: nix develop -c just direct-capture-preflight
      - run: nix develop -c just check
      - run: nix develop -c just test
      - run: nix develop -c just security

  macos:
    name: macos
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: jdx/mise-action@v4.2.0
      - run: brew install swiftformat swiftlint
      - run: just macos-check
