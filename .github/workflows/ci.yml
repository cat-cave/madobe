name: ci

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  linux:
    name: linux
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      # cachix/install-nix-action v31.10.6
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake check
      - run: nix develop -c just direct-capture-preflight
      - run: nix develop -c just check
      - run: nix develop -c just test
      - run: nix develop -c just security

  macos:
    name: macos
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      # jdx/mise-action v4.2.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d
      - run: rustup component add rustfmt clippy
      - name: Remove hosted CI runner aws/tap
        run: |
          HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew untap aws/tap || true
      - run: brew install jq swiftformat swiftlint
      - run: just macos-check
