name: nightly

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  deep-checks:
    name: deep-checks
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # cachix/install-nix-action v31.10.6
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop -c just security
      - run: nix develop -c just coverage
      - run: nix develop -c just mutants
      - run: nix develop -c lychee .
      - run: nix develop -c zizmor .github/workflows
      - run: nix develop -c deadnix --fail .
      - run: nix develop -c statix check .
