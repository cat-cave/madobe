name: nightly

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  deep-checks:
    name: deep-checks
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      # cachix/install-nix-action v31.10.6
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop -c just security
      - run: nix develop -c just coverage
      - run: nix develop -c just mutants
      - run: nix develop -c lychee .
      - run: nix develop -c zizmor .github/workflows
      - run: nix develop -c deadnix --fail .
      - run: nix develop -c statix check .
